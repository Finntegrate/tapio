name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint (prek)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      prek_outcome: ${{ steps.prek.outcome }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python environment
        uses: ./.github/actions/setup-env

      # actionlint and markdownlint-cli2 are mise-managed tools (see mise.toml) used
      # by two of the prek hooks below; node is markdownlint-cli2's runtime, not
      # used directly. Only install these three, not the full mise.toml set,
      # since python/uv are already handled by setup-env above and gh/ollama
      # aren't needed for linting. mise-action also puts mise's shims on PATH,
      # so the hooks' `mise exec --` calls resolve correctly.
      - name: Install mise tools for linting
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install_args: "actionlint markdownlint-cli2 node"

      - name: Cache prek hook environments
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/prek
          key: prek-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      # Inline annotations on the "Files changed" tab for any lint finding, independent
      # of whether prek below also catches it -- this is just for in-PR visibility.
      - name: Annotate Ruff findings
        if: always()
        continue-on-error: true
        run: uv run ruff check --output-format=github .

      # Runs the same checks as the local pre-commit hook (yaml/json/toml checks,
      # pyupgrade, trailing commas, ruff lint+format, keep-sorted) so CI fails on
      # anything a contributor's local hook would have caught. mypy and pyrefly run
      # in the separate typecheck job instead of letting prek build a second,
      # duplicate dependency set for them.
      # continue-on-error here lets the report job see this job's outcome alongside
      # typecheck/test's outcomes even if this fails -- the report job's gate step
      # still enforces it via prek_outcome.
      - name: Run pre-commit checks (prek)
        id: prek
        continue-on-error: true
        run: SKIP=mypy,pyrefly uv run prek run --all-files

  typecheck:
    name: Type Checking
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      mypy_outcome: ${{ steps.mypy.outcome }}
      pyrefly_outcome: ${{ steps.pyrefly.outcome }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python environment
        uses: ./.github/actions/setup-env

      # continue-on-error so a mypy failure doesn't prevent pyrefly from also
      # reporting -- both outcomes surface in the report job's summary and gate.
      - name: Run type checking with Mypy
        id: mypy
        continue-on-error: true
        run: uv run mypy tapio

      - name: Run Pyrefly code check
        id: pyrefly
        continue-on-error: true
        run: uv run pyrefly check

  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]
    outputs:
      pytest_outcome: ${{ steps.pytest.outcome }}
      coverage_outcome: ${{ steps.coverage.outcome }}
      coverage_pct: ${{ steps.coverage.outputs.coverage_pct }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python environment
        uses: ./.github/actions/setup-env
        with:
          python-version: ${{ matrix.python-version }}

      # continue-on-error so the coverage-threshold step below still runs (and
      # reports a percentage) even when a test fails, instead of skipping it.
      - name: Test with pytest and coverage
        id: pytest
        continue-on-error: true
        run: uv run pytest --cov=tapio --cov-report=xml --cov-report=term

      - name: Check coverage threshold
        id: coverage
        continue-on-error: true
        run: |
          coverage_result=$(uv run coverage report | tail -1 | awk '{print $NF}' | sed 's/%//')
          echo "coverage_pct=$coverage_result" >> "$GITHUB_OUTPUT"
          echo "Coverage: $coverage_result%"
          if (( $(echo "$coverage_result < 80" | bc -l) )); then
            echo "❌ Coverage threshold not met: $coverage_result% is less than 80%"
            exit 1
          else
            echo "✅ Coverage threshold met: $coverage_result% is greater than or equal to 80%"
          fi

  # Aggregates the three parallel jobs above. Runs even if they failed (if: always())
  # so the summary/comment/gate below reflect every job's outcome, not just the first
  # to fail.
  report:
    name: Report results
    needs: [lint, typecheck, test]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # only this job needs to post/update the coverage comment
    steps:
      # Aggregated pass/fail dashboard rendered on the workflow run's Summary tab,
      # so contributors don't need to open individual job logs to see what failed.
      - name: Write job summary
        run: |
          {
            echo "## CI Results"
            echo
            echo "| Check | Result |"
            echo "|-------|--------|"
            echo "| prek (lint, format, yaml/json/toml, etc.) | ${{ needs.lint.outputs.prek_outcome == 'success' && '✅ Passed' || '❌ Failed' }} |"
            echo "| mypy | ${{ needs.typecheck.outputs.mypy_outcome == 'success' && '✅ Passed' || '❌ Failed' }} |"
            echo "| pyrefly | ${{ needs.typecheck.outputs.pyrefly_outcome == 'success' && '✅ Passed' || '❌ Failed' }} |"
            echo "| pytest | ${{ needs.test.outputs.pytest_outcome == 'success' && '✅ Passed' || '❌ Failed' }} |"
            echo "| coverage (≥80%) | ${{ needs.test.outputs.coverage_outcome == 'success' && '✅ Passed' || '❌ Failed' }} (${{ needs.test.outputs.coverage_pct }}%) |"
          } >> "$GITHUB_STEP_SUMMARY"

      # Posts a sticky comment directly in the PR conversation (not just the Summary
      # tab) so a missed coverage threshold is impossible to miss. Updates the same
      # comment on re-runs instead of piling up duplicates. continue-on-error because
      # GITHUB_TOKEN is read-only for pull_request workflows triggered by forks, so
      # this step is expected to fail for external contributions -- it must not block
      # the "Fail if any check failed" gate below, which still enforces the threshold.
      - name: Comment coverage on pull request
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const coveragePct = '${{ needs.test.outputs.coverage_pct }}' || 'unknown';
            const passed = '${{ needs.test.outputs.coverage_outcome }}' === 'success';
            const marker = '<!-- tapio-coverage-report -->';
            const body = [
              marker,
              '## Test Coverage Report',
              '',
              `${passed ? '✅' : '❌'} **${coveragePct}%** coverage (required: ≥80%)`,
              '',
              passed
                ? 'Coverage meets the project threshold. 🎉'
                : '⚠️ Coverage is below the required 80% threshold. Please add tests for the new or changed code before this pull request can be merged.',
            ].join('\n');

            // paginate() walks every page of comments, not just the first 30, so a
            // long-lived PR's earlier sticky comment is never missed; restricting to
            // github-actions[bot] avoids matching a human comment that happens to
            // quote the marker text.
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(
              (comment) => comment.user.login === 'github-actions[bot]' && comment.body.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if any check failed
        run: |
          if [ "${{ needs.lint.outputs.prek_outcome }}" != "success" ] || \
             [ "${{ needs.typecheck.outputs.mypy_outcome }}" != "success" ] || \
             [ "${{ needs.typecheck.outputs.pyrefly_outcome }}" != "success" ] || \
             [ "${{ needs.test.outputs.pytest_outcome }}" != "success" ] || \
             [ "${{ needs.test.outputs.coverage_outcome }}" != "success" ]; then
            echo "One or more checks failed. See the job summary above and the failing job's log for details."
            exit 1
          fi

    # - name: Upload coverage to Codecov
    #   uses: codecov/codecov-action@v4
    #   with:
    #     file: ./coverage.xml
    #     fail_ci_if_error: false
    #     token: ${{ secrets.CODECOV_TOKEN }}
    #     verbose: true
