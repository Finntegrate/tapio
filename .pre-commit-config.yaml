default_language_version:
  python: python3.14
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.21.2
    hooks:
      - id: pyupgrade
        args: [--py313-plus]
  - repo: https://github.com/asottile/add-trailing-comma
    rev: v3.1.0
    hooks:
      - id: add-trailing-comma
        args: [--py36-plus]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.15.20
    hooks:
      # Run the linter.
      - id: ruff
        args: [--fix]
      # Run the formatter.
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic
          - types-PyYAML
          - types-lxml
          - scrapy
          - twisted
          - pytest
          - torch
          - chromadb
          - langchain-chroma
          - langchain-core
          - langchain-huggingface[full]
          - langchain-text-splitters
          - langchain-community
          - langchain
          - ollama
          - html2text
          - gradio
          - typer
          - python-frontmatter
        # Using project's mypy.ini for configuration
        args: [--config-file=mypy.ini]
        exclude: ^tests/
  - repo: https://github.com/google/keep-sorted
    rev: v0.6.0
    hooks:
      - id: keep-sorted
  - repo: local
    hooks:
      - id: pyrefly
        name: Pyrefly Code Check
        entry: uv run pyrefly check
        language: system
        types: [python]
        pass_filenames: false
      # actionlint and markdownlint-cli2 are installed via mise (see mise.toml)
      # rather than as pre-commit-managed hook repos, since both already exist as
      # mise tools used elsewhere in the project. Routed through `mise exec --`
      # rather than calling the binary directly: git invokes hooks without
      # sourcing the shell's `mise activate`, so mise's shims aren't guaranteed
      # to be on PATH there even though they are in an interactive shell.
      # actionlint only understands workflow files (it requires "on"/"jobs"
      # sections), not composite action.yaml definitions under .github/actions/.
      - id: actionlint
        name: Lint GitHub Actions workflows
        entry: mise exec -- actionlint
        language: system
        files: ^\.github/workflows/.*\.ya?ml$
      # --fix covers structural rules (blanks-around-lists/fences, list markers,
      # trailing spaces, etc.). MD013 (line length/prose wrap) has no fixer in
      # markdownlint itself -- confirmed by testing --fix against a copy of
      # README.md, which left every MD013 violation unchanged -- so it stays
      # disabled in .markdownlint-cli2.jsonc rather than left as unfixable noise.
      - id: markdownlint-cli2
        name: Lint Markdown
        entry: mise exec -- markdownlint-cli2
        language: system
        types: [markdown]
        args: [--fix]
